    <path id="petalSettings" fill="#0F5BF9" d="M 360.8 282.0 L 363.3 42.0 A 318 318 0 0 1 678.0 356.7 L 438.0 359.2 A 78 78 0 0 0 360.8 282.0 Z"/>
