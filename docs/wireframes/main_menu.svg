    <text x="220" y="505" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">Sleep</text>
    <text x="220" y="225" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold">Rest</text>
