<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="720" viewBox="0 0 720 720">
  <defs>
    <clipPath id="displayCircle"><circle cx="360" cy="360" r="354"/></clipPath>
  </defs>
  <g clip-path="url(#displayCircle)">
    <rect id="background" width="720" height="720" fill="#000000"/>
    <text id="message" x="360" y="280" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold">Are you sure?</text>
    <text x="360" y="330" text-anchor="middle" fill="#AAAAAA" font-family="Arial" font-size="20">End timer early</text>
    <g id="sideNo">
      <rect x="120" y="400" width="180" height="80" rx="40" fill="#E87A2E"/>
      <text x="210" y="450" text-anchor="middle" fill="#FFF" font-family="Arial" font-size="26" font-weight="bold">No</text>
    </g>
    <g id="sideYes">
      <rect x="420" y="400" width="180" height="80" rx="40" fill="#3CB85C"/>
      <text x="510" y="450" text-anchor="middle" fill="#FFF" font-family="Arial" font-size="26" font-weight="bold">Yes</text>
    </g>
  </g>
  <circle id="outerRing" cx="360" cy="360" r="357" fill="none" stroke="#7A24BC" stroke-width="6"/>
</svg>
